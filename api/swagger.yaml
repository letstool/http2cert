openapi: 3.0.3
info:
  title: http2cert
  description: |
    HTTP API for inspecting X.509 certificates.

    Accepts either a **live TLS socket** (domain, IPv4, or IPv6) or **raw certificate
    data** (PEM or DER, single certificate or full chain) and returns all parsed
    certificate fields in JSON — equivalent to `openssl x509 -noout -text`.

    The full certificate chain is returned for socket requests (leaf first).
    PEM bundles with multiple `CERTIFICATE` blocks are fully supported.
  version: 1.0.0
  contact: {}
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:8080
    description: Default local server (override with LISTEN_ADDR env var or -addr
      flag)
tags:
  - name: certificates
    description: Certificate inspection operations
paths:
  /api/v1/certinfo:
    post:
      tags:
        - certificates
      summary: Inspect one or more X.509 certificates
      description: |
        Parses and returns detailed information about X.509 certificates.

        **Exactly one** of `socket` or `raw_cert_data` must be provided.

        ### Socket mode
        Dials the given `host:port`, performs a TLS handshake, and returns the
        full certificate chain presented by the server (leaf first).

        - `socket` accepts `domain:port`, `IPv4:port`, or `[IPv6]:port`.
        - `sni` is optional; when omitted, the host part of `socket` is used
          (standard TLS behaviour). Must be set explicitly when `socket` contains
          a bare IP address and the desired SNI differs from the IP.
        - `timeout` is an optional per-request dial+handshake timeout in seconds
          (1–120). Defaults to the server-wide value (10 s).

        ### Raw mode
        Parses certificate bytes supplied directly in the request body.

        - Accepts PEM (single certificate or multi-certificate chain) and DER.
        - Format is auto-detected.
        - `timeout` and `sni` are **not valid** in this mode.
      operationId: inspectCertificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Request'
            examples:
              socket_domain:
                summary: Socket — domain name
                value:
                  socket: example.com:443
              socket_ip_with_sni:
                summary: Socket — IP address with explicit SNI
                value:
                  socket: 93.184.216.34:443
                  sni: example.com
              socket_ipv6:
                summary: Socket — IPv6
                value:
                  socket: '[2606:2800:220:1:248:1893:25c8:1946]:443'
              socket_with_timeout:
                summary: Socket — custom timeout
                value:
                  socket: example.com:8443
                  timeout: 5
              raw_pem_single:
                summary: Raw — single PEM certificate
                value:
                  raw_cert_data: |
                    -----BEGIN CERTIFICATE-----
                    MIIC....
                    -----END CERTIFICATE-----
              raw_pem_chain:
                summary: Raw — PEM chain (leaf + intermediates)
                value:
                  raw_cert_data: |
                    -----BEGIN CERTIFICATE-----
                    MIIC....
                    -----END CERTIFICATE-----
                    -----BEGIN CERTIFICATE-----
                    MIIC....
                    -----END CERTIFICATE-----
      responses:
        '200':
          description: |
            Request processed. Always check the `result` field — `200` is returned
            even when no certificates could be found (`NO_CERTIFICATES`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success_socket:
                  summary: Successful socket inspection (2-cert chain)
                  value:
                    result: SUCCESS
                    source:
                      type: SOCKET
                      address: 93.184.216.34:443
                      sni: example.com
                      timeout: 10
                      cert_count: 2
                    answers:
                      - format: PEM
                        raw: "-----BEGIN CERTIFICATE-----\nMIIC....\n-----END CERTIFICATE-----\n"
                        version: 3
                        serial_number: 0a:bc:de:f0:12:34
                        serial_number_dec: '45812345678901234'
                        signature_algorithm: SHA256-RSA
                        issuer:
                          raw: CN=Let's Encrypt R3,O=Let's Encrypt,C=US
                          common_name: Let's Encrypt R3
                          organization:
                            - Let's Encrypt
                          country:
                            - US
                        validity:
                          not_before: '2024-01-01T00:00:00Z'
                          not_before_timestamp: 1704067200
                          not_after: '2025-01-01T00:00:00Z'
                          not_after_timestamp: 1735689600
                          is_expired: false
                          days_left: 120
                        subject:
                          raw: CN=example.com
                          common_name: example.com
                        public_key_info:
                          algorithm: RSA
                          key_size_bits: 2048
                          exponent: 65537
                          public_key_hex: b3a4...
                        extensions:
                          subject_alternative_name:
                            critical: false
                            dns_names:
                              - example.com
                              - www.example.com
                          basic_constraints:
                            critical: true
                            is_ca: false
                            max_path_len: -1
                          key_usage:
                            critical: true
                            usages:
                              - Digital Signature
                              - Key Encipherment
                          extended_key_usage:
                            critical: false
                            usages:
                              - TLS Web Server Authentication
                        signature:
                          algorithm: SHA256-RSA
                          value_hex: 3a4b...
                        fingerprints:
                          sha1: ab:cd:ef:...
                          sha256: 01:23:45:...
                          sha512: ef:01:23:...
                        is_self_signed: false
                        is_ca: false
                no_certificates:
                  summary: No certificates returned
                  value:
                    result: NO_CERTIFICATES
                    message: no certificates returned by server
                    answers: []
        '400':
          description: Invalid request (malformed JSON, missing/conflicting fields,
            invalid timeout value).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                missing_fields:
                  summary: Neither socket nor raw_cert_data provided
                  value:
                    result: INVALID_INPUT
                    message: request must contain either "socket" or "raw_cert_data"
                    answers: []
                both_fields:
                  summary: Both socket and raw_cert_data provided
                  value:
                    result: INVALID_INPUT
                    message: provide either "socket" or "raw_cert_data", not both
                    answers: []
                timeout_with_raw:
                  summary: timeout used with raw_cert_data
                  value:
                    result: INVALID_INPUT
                    message: '"timeout" is only valid with "socket", not with "raw_cert_data"'
                    answers: []
                invalid_timeout:
                  summary: timeout out of range
                  value:
                    result: INVALID_INPUT
                    message: timeout must be between 1 and 120, got 999
                    answers: []
        '502':
          description: |
            Upstream connectivity error. Returned when `socket` mode is used and
            the remote host could not be reached or the TLS handshake failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                not_found:
                  summary: Host not reachable
                  value:
                    result: NOTFOUND
                    message: 'NOTFOUND dialing does-not-exist.invalid:443: no such
                      host'
                    answers: []
                tls_error:
                  summary: TLS handshake failure
                  value:
                    result: TLS_ERROR
                    message: 'TLS_ERROR dialing example.com:443: tls: handshake failure'
                    answers: []
components:
  schemas:
    Request:
      type: object
      description: |
        Exactly one of `socket` or `raw_cert_data` must be present.
        `sni` and `timeout` are only valid alongside `socket`.
      properties:
        socket:
          type: string
          description: |
            TLS endpoint to dial, in `host:port` format.
            Domain name: `example.com:443`, IPv4: `1.2.3.4:443`, IPv6: `[::1]:443`.
          example: example.com:443
        sni:
          type: string
          description: |
            Server Name Indication to send in the TLS ClientHello. Optional —
            defaults to the host part of `socket` when it is a domain name, or
            empty when it is an IP address.
          example: example.com
        timeout:
          type: integer
          description: |
            Per-request dial + TLS handshake timeout in seconds (1–120).
            Defaults to the server-wide value (10 s) when omitted.
            Not valid with `raw_cert_data`.
          minimum: 1
          maximum: 120
          example: 10
        raw_cert_data:
          type: string
          description: |
            Raw certificate bytes as a UTF-8 string. Accepts PEM (single block
            or multi-block chain) and DER. Format is auto-detected.
          example: |
            -----BEGIN CERTIFICATE-----
            MIIC...
            -----END CERTIFICATE-----
      oneOf:
        - required:
            - socket
        - required:
            - raw_cert_data
    Response:
      type: object
      required:
        - result
        - answers
      properties:
        result:
          $ref: '#/components/schemas/ResultCode'
        message:
          type: string
          description: Human-readable error detail. Present on all non-SUCCESS results.
        source:
          $ref: '#/components/schemas/SourceInfo'
        answers:
          type: array
          description: Parsed certificates in chain order. Empty array on error —
            never null.
          items:
            $ref: '#/components/schemas/CertificateInfo'
    ResultCode:
      type: string
      description: |
        Machine-readable status code.

        | Value | Meaning |
        |---|---|
        | `SUCCESS` | At least one certificate was parsed and returned |
        | `INVALID_INPUT` | Request body malformed or fields invalid / conflicting |
        | `NOTFOUND` | Host unreachable (DNS failure, connection refused, timeout) |
        | `TLS_ERROR` | TCP connected but TLS handshake failed |
        | `NO_CERTIFICATES` | Connection succeeded but server sent no certificates |
        | `ERROR` | Internal server error |
      enum:
        - SUCCESS
        - INVALID_INPUT
        - NOTFOUND
        - TLS_ERROR
        - NO_CERTIFICATES
        - ERROR
      example: SUCCESS
    SourceInfo:
      type: object
      required:
        - type
        - cert_count
      description: Describes the origin of the certificate data.
      properties:
        type:
          type: string
          enum:
            - SOCKET
            - RAW
          example: SOCKET
        address:
          type: string
          description: Resolved `host:port` dialed. SOCKET only.
          example: 93.184.216.34:443
        sni:
          type: string
          description: SNI sent in the ClientHello. SOCKET only.
          example: example.com
        timeout:
          type: integer
          description: Effective timeout in seconds applied. SOCKET only.
          example: 10
        format:
          type: string
          enum:
            - PEM
            - DER
          description: Detected certificate format. RAW only.
          example: PEM
        cert_count:
          type: integer
          description: Number of certificates returned.
          example: 2
    CertificateInfo:
      type: object
      required:
        - raw
        - format
        - version
        - serial_number
        - serial_number_dec
        - signature_algorithm
        - issuer
        - validity
        - subject
        - public_key_info
        - signature
        - fingerprints
        - is_self_signed
        - is_ca
      description: Full parsed representation of a single X.509 certificate.
      properties:
        raw:
          type: string
          description: PEM-encoded certificate (the raw certificate being described).
          example: "-----BEGIN CERTIFICATE-----\nMIIC...\n-----END CERTIFICATE-----\n"
        format:
          type: string
          enum:
            - PEM
            - DER
          example: PEM
        version:
          type: integer
          description: X.509 version (1, 2, or 3).
          example: 3
        serial_number:
          type: string
          description: Serial number as colon-separated hex (OpenSSL style).
          example: 0a:bc:de:f0:12:34
        serial_number_dec:
          type: string
          description: Serial number in decimal notation.
          example: '45812345678901234'
        signature_algorithm:
          type: string
          example: SHA256-RSA
        issuer:
          $ref: '#/components/schemas/DistinguishedName'
        validity:
          $ref: '#/components/schemas/Validity'
        subject:
          $ref: '#/components/schemas/DistinguishedName'
        public_key_info:
          $ref: '#/components/schemas/PublicKeyInfo'
        extensions:
          $ref: '#/components/schemas/Extensions'
        signature:
          $ref: '#/components/schemas/SignatureInfo'
        fingerprints:
          $ref: '#/components/schemas/Fingerprints'
        is_self_signed:
          type: boolean
          example: false
        is_ca:
          type: boolean
          example: false
    DistinguishedName:
      type: object
      required:
        - raw
      properties:
        raw:
          type: string
          example: CN=example.com,O=ACME Inc,C=US
        common_name:
          type: string
          example: example.com
        organization:
          type: array
          items:
            type: string
          example:
            - ACME Inc
        organizational_unit:
          type: array
          items:
            type: string
        country:
          type: array
          items:
            type: string
          example:
            - US
        locality:
          type: array
          items:
            type: string
        province:
          type: array
          items:
            type: string
        street_address:
          type: array
          items:
            type: string
        postal_code:
          type: array
          items:
            type: string
        serial_number:
          type: string
        email_address:
          type: array
          items:
            type: string
    Validity:
      type: object
      required:
        - not_before
        - not_before_timestamp
        - not_after
        - not_after_timestamp
        - is_expired
        - days_left
      properties:
        not_before:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
        not_before_timestamp:
          type: integer
          format: int64
          description: Unix timestamp (seconds since epoch).
          example: 1704067200
        not_after:
          type: string
          format: date-time
          example: '2025-01-01T00:00:00Z'
        not_after_timestamp:
          type: integer
          format: int64
          description: Unix timestamp (seconds since epoch).
          example: 1735689600
        is_expired:
          type: boolean
          example: false
        days_left:
          type: integer
          description: Days until expiry. Negative when already expired.
          example: 120
    PublicKeyInfo:
      type: object
      required:
        - algorithm
        - key_size_bits
        - public_key_hex
      properties:
        algorithm:
          type: string
          description: RSA | EC | Ed25519 | X25519/ECDH | DSA
          example: RSA
        key_size_bits:
          type: integer
          example: 2048
        curve:
          type: string
          description: Elliptic curve name (EC keys only).
          example: P-256
        exponent:
          type: integer
          description: RSA public exponent (RSA keys only).
          example: 65537
        public_key_hex:
          type: string
          description: Hex-encoded raw public key bytes.
          example: b3a4c5...
    SignatureInfo:
      type: object
      required:
        - algorithm
        - value_hex
      properties:
        algorithm:
          type: string
          example: SHA256-RSA
        value_hex:
          type: string
          description: Hex-encoded DER signature bytes.
          example: 3a4b5c...
    Fingerprints:
      type: object
      required:
        - sha1
        - sha256
        - sha512
      description: |
        Hash digests of the DER-encoded certificate, as colon-separated lowercase
        hex — identical to `openssl x509 -fingerprint -sha256 -noout` output.
      properties:
        sha1:
          type: string
          example: ab:cd:ef:01:23:45:67:89:ab:cd:ef:01:23:45:67:89:ab:cd:ef:01
        sha256:
          type: string
          example: 01:23:45:67:89:ab:cd:ef:01:23:45:67:89:ab:cd:ef:01:23:45:67:89:ab:cd:ef:01:23:45:67:89:ab:cd:ef
        sha512:
          type: string
          example: ab:cd:ef:...
    Extensions:
      type: object
      description: Parsed X.509 v3 extensions. All fields are optional.
      properties:
        subject_key_identifier:
          $ref: '#/components/schemas/SubjectKeyIdentifier'
        authority_key_identifier:
          $ref: '#/components/schemas/AuthorityKeyIdentifier'
        key_usage:
          $ref: '#/components/schemas/KeyUsage'
        extended_key_usage:
          $ref: '#/components/schemas/ExtendedKeyUsage'
        subject_alternative_name:
          $ref: '#/components/schemas/SubjectAlternativeName'
        basic_constraints:
          $ref: '#/components/schemas/BasicConstraints'
        crl_distribution_points:
          type: array
          items:
            type: string
          example:
            - http://crl.example.com/crl.crl
        authority_info_access:
          $ref: '#/components/schemas/AuthorityInfoAccess'
        certificate_policies:
          type: array
          items:
            $ref: '#/components/schemas/CertificatePolicy'
        name_constraints:
          $ref: '#/components/schemas/NameConstraints'
        ocsp_no_check:
          type: boolean
          example: false
        signed_certificate_timestamps:
          type: array
          items:
            type: string
          description: Raw hex-encoded SCTs from the Certificate Transparency SCT
            List extension.
        unknown_extensions:
          type: array
          items:
            $ref: '#/components/schemas/UnknownExtension'
    SubjectKeyIdentifier:
      type: object
      required:
        - critical
        - key_id
      properties:
        critical:
          type: boolean
          example: false
        key_id:
          type: string
          example: ab:cd:ef:01:23
    AuthorityKeyIdentifier:
      type: object
      required:
        - critical
      properties:
        critical:
          type: boolean
          example: false
        key_id:
          type: string
          example: ab:cd:ef:01:23
        issuers:
          type: array
          items:
            type: string
        serial:
          type: string
          example: 0a:bc:de
    KeyUsage:
      type: object
      required:
        - critical
        - usages
      properties:
        critical:
          type: boolean
          example: true
        usages:
          type: array
          items:
            type: string
            enum:
              - Digital Signature
              - Non Repudiation
              - Key Encipherment
              - Data Encipherment
              - Key Agreement
              - Certificate Sign
              - CRL Sign
              - Encipher Only
              - Decipher Only
          example:
            - Digital Signature
            - Key Encipherment
    ExtendedKeyUsage:
      type: object
      required:
        - critical
        - usages
      properties:
        critical:
          type: boolean
          example: false
        usages:
          type: array
          items:
            type: string
          description: Well-known EKU names or raw OID strings for unknown usages.
          example:
            - TLS Web Server Authentication
    SubjectAlternativeName:
      type: object
      required:
        - critical
      properties:
        critical:
          type: boolean
          example: false
        dns_names:
          type: array
          items:
            type: string
          example:
            - example.com
            - www.example.com
        ip_addresses:
          type: array
          items:
            type: string
          example:
            - 93.184.216.34
        email_addresses:
          type: array
          items:
            type: string
        uris:
          type: array
          items:
            type: string
          example:
            - spiffe://cluster.local/ns/default/sa/web
    BasicConstraints:
      type: object
      required:
        - critical
        - is_ca
        - max_path_len
        - max_path_len_zero
      properties:
        critical:
          type: boolean
          example: true
        is_ca:
          type: boolean
          example: false
        max_path_len:
          type: integer
          description: Maximum CA path length. `-1` means the field is not set.
          example: -1
        max_path_len_zero:
          type: boolean
          description: True when `max_path_len` is explicitly set to zero.
          example: false
    AuthorityInfoAccess:
      type: object
      required:
        - critical
      properties:
        critical:
          type: boolean
          example: false
        ocsp_servers:
          type: array
          items:
            type: string
          example:
            - http://ocsp.example.com
        ca_issuers:
          type: array
          items:
            type: string
          example:
            - http://certs.example.com/r3.der
    CertificatePolicy:
      type: object
      required:
        - oid
      properties:
        oid:
          type: string
          example: 2.23.140.1.2.1
        name:
          type: string
          description: Friendly name for well-known policy OIDs.
          example: CA/Browser Forum DV
        qualifiers:
          type: array
          items:
            type: string
    NameConstraints:
      type: object
      required:
        - critical
      properties:
        critical:
          type: boolean
          example: true
        permitted_dns:
          type: array
          items:
            type: string
          example:
            - .example.com
        excluded_dns:
          type: array
          items:
            type: string
        permitted_ips:
          type: array
          items:
            type: string
          example:
            - 192.168.0.0/24
        excluded_ips:
          type: array
          items:
            type: string
        permitted_emails:
          type: array
          items:
            type: string
        excluded_emails:
          type: array
          items:
            type: string
        permitted_uri_domains:
          type: array
          items:
            type: string
        excluded_uri_domains:
          type: array
          items:
            type: string
    UnknownExtension:
      type: object
      required:
        - oid
        - critical
        - value_hex
      description: An X.509 extension not specifically decoded by the library.
      properties:
        oid:
          type: string
          example: 1.3.6.1.4.1.12345.1
        critical:
          type: boolean
          example: false
        value_hex:
          type: string
          description: Raw DER value of the extension as a hex string.
          example: '0403020100'
